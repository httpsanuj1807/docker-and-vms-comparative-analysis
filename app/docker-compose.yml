version: '3.8'

# =============================================================================
# Docker Compose for Research Web Application
# Used for local development and testing
# =============================================================================

services:
  research-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Resource limits matching research paper configuration
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Alternative configuration for benchmark testing
  research-app-benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-app-benchmark
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    profiles:
      - benchmark
    restart: "no"
